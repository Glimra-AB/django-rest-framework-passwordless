name: Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pipenv
        run: pip install pipenv==2026.6.1

      - name: Verify lock file
        run: pipenv verify

      - name: Install dependencies from lock file
        run: pipenv sync --dev

      - name: Run tests
        run: pipenv run pytest tests
